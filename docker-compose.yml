version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: rbac_prod
      POSTGRES_USER: rbac_user
      POSTGRES_PASSWORD: rbac_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbac_user -d rbac_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
